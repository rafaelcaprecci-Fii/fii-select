<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FII Select | Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page admin-auth">
    <main class="auth-card">
      <a class="brand auth-brand" href="index.html"><img class="brand-logo dark-logo" src="ASSETS/logo-header-fii-select.png" alt="FII Select" /><span>ADMIN</span></a>
      <p class="eyebrow">Admin</p>
      <h1>Entrar no painel</h1>
      <p class="muted">Acesso restrito à administração do FII Select.</p>
      <form class="stack-form" action="admin.html">
        <label>E-mail<input type="email" required /></label>
        <label>Senha<input type="password" required /></label>
        <button class="cta cta-gold" type="submit">Entrar no painel</button>
      </form>
    </main>
  </body>
</html>
